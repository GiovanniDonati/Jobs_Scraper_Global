services:
  postgres:
    image: postgres:16-alpine
    container_name: vagas-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vagas-net
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: vagas-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vagas-net
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  vagas-net:
    name: vagas-net